<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zones Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo-text"><span class="logo-the">The</span><span class="logo-5">5</span><span class="logo-pct">%</span><span class="logo-ers">ers</span></span>
        <span class="topbar-divider">|</span>
        <span class="topbar-title">Zones Tracker</span>
      </div>
      <div class="topbar-right">
        <select id="pair-select" class="pair-dropdown">
          <option value="">— Select Pair —</option>
        </select>
      </div>
    </header>

    <main id="main-content">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">⬡</div>
        <p>Select a pair to view zones</p>
      </div>
      <div id="pair-dashboard" class="pair-dashboard hidden"></div>
    </main>
  </div>

  <!-- MODALS -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="zone-modal" class="modal hidden"></div>
  <div id="comment-modal" class="modal hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/pairs.js"></script>
  <script src="js/zones.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
