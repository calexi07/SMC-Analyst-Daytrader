<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cristian — The Delivery Man</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">

    <header class="topbar">
      <div class="topbar-left">
        <span class="logo-text">
          <span class="logo-the">The</span><span class="logo-5">5</span><span class="logo-pct">%</span><span class="logo-ers">ers</span>
        </span>
        <span class="topbar-divider">|</span>
        <span class="topbar-title">The Delivery Man</span>
      </div>
      <nav class="topbar-nav">
        <button class="nav-btn active" id="nav-dashboard">📊 Dashboard</button>
        <button class="nav-btn" id="nav-pairs">🗺 Zones</button>
      </nav>
    </header>

    <main id="main-content">

      <!-- DASHBOARD VIEW -->
      <div id="dashboard-view" class="view-section">
        <div class="loader" style="padding:80px;">Loading dashboard...</div>
      </div>

      <!-- PAIRS / ZONES VIEW -->
      <div id="pairs-view" class="view-section hidden">
        <div class="pairs-toolbar">
          <select id="pair-select" class="pair-dropdown">
            <option value="">— Select Pair —</option>
          </select>
        </div>
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🗺</div>
          <p>Select a pair to view zones</p>
        </div>
        <div id="pair-dashboard" class="pair-dashboard hidden"></div>
      </div>

    </main>
  </div>

  <!-- MODALS -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="zone-modal"    class="modal hidden"></div>
  <div id="comment-modal" class="modal hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/cities.js"></script>
  <script src="js/stations.js"></script>
  <script src="js/db.js"></script>
  <script src="js/pairs.js"></script>
  <script src="js/zones.js"></script>
  <script src="js/setups.js"></script>
  <script src="js/analysis.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
